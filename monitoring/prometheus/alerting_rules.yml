groups:
  - name: aircraft_engine_alerts
    interval: 30s
    rules:

      # ── Inference API ────────────────────────────────────────────────────────

      - alert: InferenceAPIDown
        expr: up{job="inference-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Inference API is down"
          description: "The inference API has been unreachable for more than 1 minute."

      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, rate(prediction_latency_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High prediction latency"
          description: "P95 prediction latency is {{ $value | humanizeDuration }} (threshold: 100ms)."

      - alert: HighPredictionErrorRate
        expr: rate(prediction_errors_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated prediction error rate"
          description: "Prediction errors are occurring at {{ $value | humanize }} errors/sec."

      # ── ML Health ────────────────────────────────────────────────────────────

      - alert: CriticalEngineDetected
        expr: rate(critical_engines_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Engine with critical failure risk detected"
          description: "One or more engines have been flagged CRITICAL in the last 5 minutes."

      - alert: NoPredictionsReceived
        expr: rate(prediction_requests_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No predictions in the last 10 minutes"
          description: "The inference API has received zero prediction requests for 10 minutes."

      # ── System: Node Exporter ────────────────────────────────────────────────

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}% (threshold: 85%)."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanize }}% (threshold: 85%)."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} is {{ $value | humanize }}% full (threshold: 80%)."

      # ── Redis ────────────────────────────────────────────────────────────────

      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 1 minute."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }} (threshold: 80%)."
