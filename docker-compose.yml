services:

  # ── Inference API ────────────────────────────────────────────────────────────
  inference-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aircraft-engine-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aircraft-network

  # ── Redis (online feature store + stream transport) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aircraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aircraft-network

  # ── Solace PubSub+ (event broker) ────────────────────────────────────────────
  solace:
    image: solace/solace-pubsub-standard:latest
    container_name: aircraft-solace
    hostname: solace
    ports:
      - "8080:8080"    # Solace Manager UI
      - "55555:55555"  # SMF (Flink connector / Python API)
      - "1883:1883"    # MQTT
      - "9000:9000"    # REST messaging
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: admin
      system_scaling_maxconnectioncount: "100"
    shm_size: "1g"
    ulimits:
      core: -1
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/SEMP/v2/config"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    networks:
      - aircraft-network

  # ── Flink JobManager ─────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:2.0-scala_2.12-java17
    container_name: aircraft-flink-jobmanager
    ports:
      - "8082:8081"    # Flink Web UI
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30000
        state.backend: rocksdb
        state.checkpoints.dir: s3://aircraft-engine-data/flink-checkpoints/
        python.executable: python3
    volumes:
      - flink-jars:/opt/flink/lib/extra
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - aircraft-network

  # ── Flink TaskManager ────────────────────────────────────────────────────────
  flink-taskmanager:
    image: flink:2.0-scala_2.12-java17
    container_name: aircraft-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2g
        state.backend: rocksdb
        state.checkpoints.dir: s3://aircraft-engine-data/flink-checkpoints/
        python.executable: python3
    volumes:
      - flink-jars:/opt/flink/lib/extra
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aircraft-network

  # ── Telemetry Producer — publishes to Solace PubSub+ ────────────────────────
  telemetry-producer:
    build:
      context: .
      dockerfile: Dockerfile.streaming
    container_name: aircraft-producer
    env_file: .env
    command: python3 -m streaming.producer.telemetry_producer --dataset artifacts/data_ingestion/data/train_FD001.txt --throttle 50
    environment:
      REDIS_URL: redis://redis:6379/0
      SOLACE_HOST: tcp://solace:55555
      SOLACE_VPN: default
      SOLACE_USERNAME: admin
      SOLACE_PASSWORD: admin
    depends_on:
      solace-provisioner:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - aircraft-network

  # ── Solace Queue Provisioner (one-shot — runs once after Solace is healthy) ──
  solace-provisioner:
    image: curlimages/curl:latest
    container_name: aircraft-solace-provisioner
    volumes:
      - ./scripts/provision_solace_queues.sh:/provision.sh:ro
    entrypoint: ["/bin/sh", "/provision.sh"]
    environment:
      SOLACE_HOST: http://solace:8080
      SOLACE_VPN: default
      SOLACE_USER: admin
      SOLACE_PASS: admin
    depends_on:
      solace:
        condition: service_healthy
    restart: "no"
    networks:
      - aircraft-network

  # ── Flink Job Submitter (one-shot — submits PyFlink job after provisioning) ──
  flink-job-submitter:
    build:
      context: .
      dockerfile: Dockerfile.streaming
    container_name: aircraft-flink-submitter
    env_file: .env
    command:
      - bash
      - -c
      - |
        echo '[submitter] Waiting for Flink JobManager...' &&
        until curl -sf http://flink-jobmanager:8081/overview; do sleep 3; done &&
        echo '[submitter] Submitting PyFlink job...' &&
        flink run -m flink-jobmanager:8081 -py streaming/pipeline/telemetry_pipeline.py --parallelism 4 -pyfs streaming/ -j /opt/flink/lib/extra/flink-connector-solace-1.1.0.jar &&
        echo '[submitter] Job submitted successfully.'
    environment:
      REDIS_URL: redis://redis:6379/0
      FLINK_HOME: /opt/flink
      SOLACE_HOST: tcp://solace:55555
      SOLACE_VPN: default
      SOLACE_USERNAME: admin
      SOLACE_PASSWORD: admin
      SOLACE_QUEUE_NAME: flink.feature.processor
      SOLACE_CONNECTOR_JAR: /opt/flink/lib/extra/flink-connector-solace-1.1.0.jar
      ENABLE_S3_SINK: "true"
      FLUSH_EVERY: "500"
      FLINK_CHECKPOINT_DIR: s3://aircraft-engine-data/flink-checkpoints/
    volumes:
      - flink-jars:/opt/flink/lib/extra
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      solace-provisioner:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - aircraft-network

  # ── Monitoring ───────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: aircraft-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    networks:
      - aircraft-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: aircraft-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aircraft-network

  prometheus:
    image: prom/prometheus:latest
    container_name: aircraft-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
    restart: unless-stopped
    networks:
      - aircraft-network

  grafana:
    image: grafana/grafana:latest
    container_name: aircraft-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - aircraft-network

  # ── Frontend Dashboard ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: aircraft-frontend
    ports:
      - "5173:80"
    depends_on:
      inference-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aircraft-network

networks:
  aircraft-network:
    driver: bridge

volumes:
  redis-data:
  flink-jars:  # shared volume for Solace connector JAR between submitter and Flink nodes
